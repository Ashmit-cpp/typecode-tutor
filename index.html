<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Enable correct browser color scheme -->
    <meta name="color-scheme" content="dark light" />

    <!-- Prevent white flash by setting theme BEFORE React -->
    <script>
      (function () {
        const theme = localStorage.getItem("vite-ui-theme");
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <!-- SEO-Friendly Title & Description -->
    <title>KeyClash - Master Your Typing Skills</title>
    <meta
      name="description"
      content="Practice typing, learn algorithms, and compete in real-time 1v1 duels. Improve your speed, accuracy, and coding proficiency with KeyClash."
    />
  </head>
  <body class="antialiased bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
